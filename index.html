<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>

    <a-scene xr-mode-ui="enabled: true">

      <!-- ASSETS -->
      <a-assets>
        <img id="nelsonImg" src="nelson.jpg">
        <img id="abeltasmanImg" src="abeltasman.jpg">

        <video id="kaiteriteriVideo"
               src="kaiteriteri.mp4"
               autoplay
               loop
               muted
               playsinline
               crossorigin="anonymous">
        </video>
      </a-assets>

      <!-- CAMERA -->
      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor 
          raycaster="objects: .clickable; far: 10"
          material="opacity: 0"
          fuse="false">
        </a-cursor>
      </a-entity>

      <!-- CONTROLLERS -->
      <a-entity laser-controls="hand: right"
                raycaster="objects: .clickable"></a-entity>

      <a-entity laser-controls="hand: left"
                raycaster="objects: .clickable"></a-entity>

      <!-- SKY -->
      <a-sky id="sky" color="#ECECEC"></a-sky>

      <!-- TV GROUP -->
      <a-entity id="tv-group"
                position="0 2 -5"
                animation="property: position;
                           to: 0 2.3 -5;
                           dir: alternate;
                           dur: 2000;
                           loop: true;
                           easing: easeInOutSine">

        <!-- Frame -->
        <a-box depth="0.3" height="3.5" width="6" color="#C0C0C0"></a-box>

        <!-- Screen -->
        <a-plane position="0 0 0.16"
                 width="5.5"
                 height="3"
                 material="shader: flat; src: #nelsonImg">
        </a-plane>

        <!-- Buttons -->

        <a-plane id="btn-nelson"
                 class="clickable"
                 position="-1.5 -1 0.2"
                 width="1.2"
                 height="0.5"
                 color="red">
          <a-text value="Nelson"
                  align="center"
                  color="white"
                  position="0 0 0.01"></a-text>
        </a-plane>

        <a-plane id="btn-kaiteriteri"
                 class="clickable"
                 position="0 -1 0.2"
                 width="1.2"
                 height="0.5"
                 color="blue">
          <a-text value="Kaiteriteri"
                  align="center"
                  color="white"
                  position="0 0 0.01"></a-text>
        </a-plane>

        <a-plane id="btn-abeltasman"
                 class="clickable"
                 position="1.5 -1 0.2"
                 width="1.2"
                 height="0.5"
                 color="green">
          <a-text value="Abel Tasman"
                  align="center"
                  color="white"
                  position="0 0 0.01"></a-text>
        </a-plane>

      </a-entity>

      <!-- BACK BUTTON -->
      <a-plane id="btn-back"
               class="clickable"
               position="0 1.5 -2"
               width="1.5"
               height="0.5"
               color="gray"
               visible="false">
        <a-text value="Back"
                align="center"
                color="white"
                position="0 0 0.01"></a-text>
      </a-plane>

    </a-scene>

    <!-- LOGIC -->
    <script>
      const tv = document.querySelector('#tv-group');
      const sky = document.querySelector('#sky');
      const video = document.querySelector('#kaiteriteriVideo');
      const backBtn = document.querySelector('#btn-back');

      function showBackButton() {
        backBtn.setAttribute('visible', 'true');
      }

      function goBack() {
        tv.setAttribute('visible', 'true');
        sky.setAttribute('color', '#ECECEC');
        sky.removeAttribute('material');

        video.pause();
        backBtn.setAttribute('visible', 'false');
      }

      backBtn.addEventListener('click', goBack);

      // Nelson
      document.querySelector('#btn-nelson').addEventListener('click', function () {
        tv.setAttribute('visible', 'false');
        sky.setAttribute('material', 'src', '#nelsonImg');
        showBackButton();
      });

      // Kaiteriteri (VIDEO)
      document.querySelector('#btn-kaiteriteri').addEventListener('click', function () {
        tv.setAttribute('visible', 'false');

        video.play().catch(e => console.log(e));

        sky.setAttribute('material', 'src', '#kaiteriteriVideo');

        showBackButton();
      });

      // Abel Tasman
      document.querySelector('#btn-abeltasman').addEventListener('click', function () {
        tv.setAttribute('visible', 'false');
        sky.setAttribute('material', 'src', '#abeltasmanImg');
        showBackButton();
      });
    </script>

  </body>
</html>
