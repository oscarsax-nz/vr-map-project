<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>

    <a-scene xr-mode-ui="enabled: true">

      <!-- Camera -->
     <a-entity camera look-controls position="0 1.6 0">
  <a-cursor raycaster="objects: .clickable"
            material="opacity: 0"></a-cursor>
</a-entity>

      <!-- Controllers -->
      <a-entity laser-controls="hand: right"
                raycaster="objects: .clickable"></a-entity>

      <a-entity laser-controls="hand: left"
                raycaster="objects: .clickable"></a-entity>

    <a-entity id="tv-group"
          position="0 2 -5"
          animation="property: position; 
                     to: 0 2.3 -5; 
                     dir: alternate; 
                     dur: 2000; 
                     loop: true;
                     easing: easeInOutSine">

  <!-- Silver back -->
  <a-cylinder radius="5.2"
              height="0.2"
              rotation="0 90 0"
              color="#C0C0C0">
  </a-cylinder>

  <!-- Screen (curved front) -->
  <a-cylinder radius="5"
              height="0.1"
              rotation="0 90 0"
              color="white"
              material="src: map.png">
  </a-cylinder>

</a-entity>
      </a-scene>

  </body>
</html>
