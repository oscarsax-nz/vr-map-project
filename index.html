<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>

    <a-scene cursor="rayOrigin: mouse" xr-mode-ui="enabled: true">

      <!-- ASSETS -->
      <a-assets>
        <img id="nelsonImg" src="kaiteriteri.jpg">
        <img id="abeltasmanImg" src="kaiteriteri.jpg">

        <video id="kaiteriteriVideo"
               src="kaiteriteri.mp4"
               loop
               muted
               playsinline
               webkit-playsinline
               crossorigin="anonymous">
        </video>
      </a-assets>

      <!-- CAMERA -->
      <a-entity camera look-controls="pointerLockEnabled: true" position="0 1.6 0">
        <!-- HIDDEN CURSOR -->
        <a-cursor 
          raycaster="objects: .clickable"
          material="opacity: 0">
        </a-cursor>
      </a-entity>

      <!-- CONTROLLERS -->
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable"></a-entity>
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>

      <!-- Default neutral sky -->
<a-sky id="sky-default"
       class="noclick"
       color="#ECECEC"
       visible="true"
       material="side: back">
</a-sky>

<!-- Image sky -->
<a-sky id="sky-image"
       class="noclick"
       visible="false"
       material="shader: flat; side: back; src: #nelsonImg">
</a-sky>

<!-- Video sky -->
<a-sky id="sky-video"
       class="noclick"
       visible="false"
       material="shader: flat; side: back; src: #kaiteriteriVideo">
</a-sky>

      <!-- TV -->
      <a-entity id="tv-group"
                position="0 2 -5"
                animation="property: position;
                           to: 0 2.3 -5;
                           dir: alternate;
                           dur: 2000;
                           loop: true;
                           easing: easeInOutSine">

        <a-box depth="0.3" height="3.5" width="6" color="#C0C0C0"></a-box>

        <a-plane position="0 0 0.16"
                 width="5.5"
                 height="3"
                 material="shader: flat; src: #nelsonImg">
        </a-plane>

        <!-- Buttons -->
        <a-plane id="btn-nelson" class="clickable"
                 position="-1.5 -1 0.2"
                 width="1.2" height="0.5" color="red">
          <a-text value="Nelson" align="center" color="white"></a-text>
        </a-plane>

        <a-plane id="btn-kaiteriteri" class="clickable"
                 position="0 -1 0.2"
                 width="1.2" height="0.5" color="blue">
          <a-text value="Kaiteriteri" align="center" color="white"></a-text>
        </a-plane>

        <a-plane id="btn-abeltasman" class="clickable"
                 position="1.5 -1 0.2"
                 width="1.2" height="0.5" color="green">
          <a-text value="Abel Tasman" align="center" color="white"></a-text>
        </a-plane>

      </a-entity>

    </a-scene>
