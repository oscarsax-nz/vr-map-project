<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>

    <a-scene xr-mode-ui="enabled: true">

      <!-- Camera (cursor hidden) -->
      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor 
          raycaster="objects: .clickable; far: 10"
          material="opacity: 0"
          fuse="false">
        </a-cursor>
      </a-entity>

      <!-- Controllers -->
      <a-entity laser-controls="hand: right"
                raycaster="objects: .clickable"></a-entity>

      <a-entity laser-controls="hand: left"
                raycaster="objects: .clickable"></a-entity>

      <!-- TV GROUP -->
      <a-entity id="tv-group"
                position="0 2 -5"
                animation="property: position;
                           to: 0 2.3 -5;
                           dir: alternate;
                           dur: 2000;
                           loop: true;
                           easing: easeInOutSine">

        <!-- TV frame -->
        <a-box depth="0.3"
               height="3.5"
               width="6"
               color="#C0C0C0">
        </a-box>

        <!-- Screen -->
        <a-plane position="0 0 0.16"
                 width="5.5"
                 height="3"
                 material="shader: flat; src: map.png">
        </a-plane>

        <!-- Buttons -->

        <a-plane id="btn-nelson"
                 class="clickable"
                 position="-1.5 -1 0.2"
                 width="1.2"
                 height="0.5"
                 color="red">
          <a-text value="Nelson"
                  align="center"
                  color="white"
                  position="0 0 0.01">
          </a-text>
        </a-plane>

        <a-plane id="btn-kaiteriteri"
                 class="clickable"
                 position="0 -1 0.2"
                 width="1.2"
                 height="0.5"
                 color="blue">
          <a-text value="Kaiteriteri"
                  align="center"
                  color="white"
                  position="0 0 0.01">
          </a-text>
        </a-plane>

        <a-plane id="btn-abeltasman"
                 class="clickable"
                 position="1.5 -1 0.2"
                 width="1.2"
                 height="0.5"
                 color="green">
          <a-text value="Abel Tasman"
                  align="center"
                  color="white"
                  position="0 0 0.01">
          </a-text>
        </a-plane>

      </a-entity>

      <a-assets>
  <video id="kaiteriteriVideo"
         src="kaiteriteri.mp4"
         autoplay
         loop
         muted
         playsinline
         crossorigin="anonymous">
  </video>
</a-assets>

      <!-- SKY (will change dynamically) -->
      <a-sky id="sky" color="#ECECEC"></a-sky>

    </a-scene>

  <script>
  const tv = document.querySelector('#tv-group');
  const sky = document.querySelector('#sky');
  const kaiteriteriVideo = document.querySelector('#kaiteriteriVideo');

  // Nelson (image)
  document.querySelector('#btn-nelson').addEventListener('click', function () {
    tv.setAttribute('visible', 'false');

    sky.setAttribute('material', 'src', 'nelson.jpg');
  });

  // Kaiteriteri (VIDEO)
  document.querySelector('#btn-kaiteriteri').addEventListener('click', function () {
    tv.setAttribute('visible', 'false');

    // play video
    kaiteriteriVideo.play();

    // attach video to sky
    sky.setAttribute('material', 'src', '#kaiteriteriVideo');
  });

  // Abel Tasman (image)
  document.querySelector('#btn-abeltasman').addEventListener('click', function () {
    tv.setAttribute('visible', 'false');

    sky.setAttribute('material', 'src', 'abeltasman.jpg');
  });
</script>

  </body>
</html>
