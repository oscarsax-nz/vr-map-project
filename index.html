<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>

    <!-- START SCREEN -->
    <div id="startScreen" style="
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      z-index: 999;
    ">
      Click to Start Experience
    </div>

    <a-scene cursor="rayOrigin: mouse" xr-mode-ui="enabled: true">

      <!-- ASSETS -->
      <a-assets>
        <img id="nelsonImg" src="kaiteriteri.jpg">
        <img id="abeltasmanImg" src="kaiteriteri.jpg">

        <video id="kaiteriteriVideo"
               src="kaiteriteri.mp4"
               loop
               muted
               playsinline
               webkit-playsinline
               crossorigin="anonymous">
        </video>
      </a-assets>

      <!-- CAMERA -->
      <a-entity camera look-controls="pointerLockEnabled: true" position="0 1.6 0">
        <a-cursor raycaster="objects: .clickable" color="black"></a-cursor>
      </a-entity>

      <!-- VR / HAND CONTROLLERS -->
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable"></a-entity>
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>

      <!-- OPTIONAL: hand tracking (Quest hands if enabled) -->
      <a-entity hand-controls="hand: left"></a-entity>
      <a-entity hand-controls="hand: right"></a-entity>

      <!-- SKY -->
      <a-sky id="sky" color="#ECECEC"></a-sky>

      <!-- TV -->
      <a-entity id="tv-group"
                position="0 2 -5"
                animation="property: position;
                           to: 0 2.3 -5;
                           dir: alternate;
                           dur: 2000;
                           loop: true;
                           easing: easeInOutSine">

        <a-box depth="0.3" height="3.5" width="6" color="#C0C0C0"></a-box>

        <a-plane position="0 0 0.16"
                 width="5.5"
                 height="3"
                 material="shader: flat; src: #nelsonImg">
        </a-plane>

        <!-- Buttons -->

        <a-plane id="btn-nelson" class="clickable"
                 position="-1.5 -1 0.2"
                 width="1.2" height="0.5" color="red">
          <a-text value="Nelson" align="center" color="white"></a-text>
        </a-plane>

        <a-plane id="btn-kaiteriteri" class="clickable"
                 position="0 -1 0.2"
                 width="1.2" height="0.5" color="blue">
          <a-text value="Kaiteriteri" align="center" color="white"></a-text>
        </a-plane>

        <a-plane id="btn-abeltasman" class="clickable"
                 position="1.5 -1 0.2"
                 width="1.2" height="0.5" color="green">
          <a-text value="Abel Tasman" align="center" color="white"></a-text>
        </a-plane>

      </a-entity>

    </a-scene>

    <!-- LOGIC -->
    <script>
      const tv = document.querySelector('#tv-group');
      const sky = document.querySelector('#sky');
      const video = document.querySelector('#kaiteriteriVideo');
      const startScreen = document.getElementById('startScreen');

      function showMenu() {
        tv.setAttribute('visible', 'true');
        sky.setAttribute('color', '#ECECEC');
        sky.removeAttribute('material');

        video.pause();
        video.currentTime = 0;
        video.src = video.src;
      }

      function goBack() {
        showMenu();
      }

      // START EXPERIENCE
      startScreen.addEventListener('click', () => {
        startScreen.style.display = 'none';
        document.body.requestPointerLock();
      });

      // KEYBOARD BACK (ESC + BACKSPACE)
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' || e.key === 'Backspace') {
          goBack();
        }
      });

      // Nelson
      document.querySelector('#btn-nelson').addEventListener('click', () => {
        tv.setAttribute('visible', 'false');

        sky.setAttribute('material', {
          shader: 'flat',
          src: '#nelsonImg'
        });
      });

      // Kaiteriteri (VIDEO)
      document.querySelector('#btn-kaiteriteri').addEventListener('click', () => {
        tv.setAttribute('visible', 'false');

        video.pause();
        video.currentTime = 0;
        video.load();

        video.onloadeddata = () => {
          video.play();
          sky.setAttribute('material', 'shader: flat; src: #kaiteriteriVideo');
        };
      });

      // Abel Tasman
      document.querySelector('#btn-abeltasman').addEventListener('click', () => {
        tv.setAttribute('visible', 'false');

        sky.setAttribute('material', {
          shader: 'flat',
          src: '#abeltasmanImg'
        });
      });

    </script>

  </body>
</html>
